name: retro-mike-fractal-bitcoin
services:
  app:
    container_name: fractal-bitcoin
    image: wvk2017/nodes:fractal-bitcoin
    restart: always
    volumes:
      - /media/ZimaOS-HD/NodeData/btc:/root/.bitcoin
    ports:
      - "7030:7030"
      - "9030:9030"
      - "8333:8333"
    command: "/usr/bin/bitcoind -printtoconsole -server -prune=550 -wallet=default -zmqpubhashblock=tcp://127.0.0.1:7030 -rpcbind=0.0.0.0 -rpcport=9030 -rpcallowip=0.0.0.0/0 -port=8333 -rpcuser=pooluser -rpcpassword=poolpassword -addnode=dnsseed-mainnet.unisat.io -addnode=dnsseed-mainnet.fractalbitcoin.io"
    x-casaos:
      volumes:
        - container: /root/.bitcoin
          description:
            en_us: 'Container Path: /root/.bitcoin'
      ports:
        - container: "7030"
          description:
            en_us: 'Container Port: 7030'
        - container: "9030"
          description:
            en_us: 'Container Port: 9030'
        - container: "8333"
          description:
            en_us: 'Container Port: 8333'
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Fractal-Bitcoin Cryptocurrency Node. Can be used in conjunction with Miningcore Apps to solo mine.
  tagline:
    en_us: Fractal-Bitcoin Cryptocurrency Node.
  developer: Retro Mike
  author: Retro Mike
  icon: https://images.cryptorank.io/coins/150x150.fractal_bitcoin1723803513675.png
  thumbnail: ""
  title:
    en_us: Fractal-Bitcoin (FB) Node
  category: RetroMike
  port_map: "8888"
